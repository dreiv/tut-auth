<!doctype html>
<html lang="en">
  <body>
    <h1>03. JWT Authentication</h1>

    <input type="text" id="username" value="admin" />
    <input type="password" id="password" value="secret123" />
    <button id="btn-login">1. Login & Get JWT</button>

    <button id="btn-test">2. Test with Token</button>

    <h3>Stored Token:</h3>
    <pre id="token-view">None</pre>

    <h3>Server Response:</h3>
    <pre id="response-view">No request sent yet.</pre>

    <script>
      const API_URL = "http://localhost:3003";
      let jwtToken = null;

      document
        .getElementById("btn-login")
        .addEventListener("click", async () => {
          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;

          const res = await fetch(`${API_URL}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();

          if (res.ok) {
            jwtToken = data.access_token;
            document.getElementById("token-view").textContent = jwtToken;
            document.getElementById("response-view").textContent =
              "Logged in successfully!";
          } else {
            document.getElementById("response-view").textContent = data.error;
          }
        });

      document
        .getElementById("btn-test")
        .addEventListener("click", async () => {
          if (!jwtToken) {
            alert("Please login first!");
            return;
          }

          const res = await fetch(`${API_URL}/tasks`, {
            method: "GET",
            headers: {
              Authorization: `Bearer ${jwtToken}`,
            },
          });

          const data = await res.json();
          document.getElementById("response-view").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        });
    </script>
  </body>
</html>
