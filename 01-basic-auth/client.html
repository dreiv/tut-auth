<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Auth Demo Client</title>
  <style>
    @layer base {
      :root {
        --bg: #fafaf9;
        --text: #44403c;
        --text-h: #1c1917;
        --border: #eaddd7;
        --code-bg: #f5f5f4;
        --accent: #f47121;
        --accent-bg: rgba(244, 113, 33, 0.05);
        --accent-border: rgba(244, 113, 33, 0.25);
        --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        --sans: 'Inter', system-ui, sans-serif;
        --mono: ui-monospace, 'Cascadia Code', monospace;
        color-scheme: light dark;
        font-family: var(--sans);
        font-size: 18px;
        line-height: 1.6;
        color: var(--text);
        background-color: var(--bg);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1917;
          --text: #a8a29e;
          --text-h: #fafaf9;
          --border: #44403c;
          --code-bg: #292524;
          --accent: #fb923c;
          --accent-bg: rgba(251, 146, 60, 0.1);
        }
      }
    }

    body {
      margin: 0;
      padding: 60px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: var(--bg);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .section {
      margin-bottom: 32px;
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--accent-bg);
    }

    h1 {
      color: var(--text-h);
      font-size: 36px;
      margin: 0 0 12px;
      letter-spacing: -0.025em;
    }

    h2 {
      margin: 0 0 20px;
      color: var(--text-h);
      font-size: 13px;
      text-transform: uppercase;
      font-family: var(--mono);
      letter-spacing: 0.1em;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text-h);
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      font-family: var(--sans);
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 200ms;

      &:hover {
        filter: brightness(1.1);
      }

      &.secondary {
        background: var(--code-bg);
        color: var(--text-h);
        border: 1px solid var(--border);
      }
    }

    .response {
      font-family: var(--mono);
      font-size: 14px;
      padding: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 20px;
      white-space: pre-wrap;

      &.success {
        border-left: 4px solid var(--accent);
      }

      &.error {
        border-left: 4px solid #ef4444;
      }
    }

    .info {
      color: var(--text);
      font-size: 14px;
      margin-top: 16px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Basic Auth Demo</h1>
    <p style="margin-bottom: 40px;">Credentials are Base64 encoded and sent with every request.</p>

    <!-- 1. Credentials Input -->
    <div class="section">
      <h2>1. Set Credentials</h2>
      <input type="text" id="username" placeholder="Username" value="admin">
      <input type="password" id="password" placeholder="Password" value="secret123">
      <div class="info">These will be used for the Authorization header.</div>
    </div>

    <!-- 2. Protected Resource -->
    <div class="section">
      <h2>2. Test Authentication</h2>
      <button onclick="fetchTasks()">Fetch Tasks (GET /tasks)</button>
      <button class="secondary" onclick="clearLocalCredentials()">Clear State</button>
      <div id="tasksResponse"></div>
    </div>

    <div class="section">
      <h2>Header Preview</h2>
      <code id="headerPreview" style="font-size: 13px; color: var(--accent);">Authorization: None</code>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3001';

    function getAuthHeader() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      // Basic Auth requires 'username:password' in Base64
      const credentials = btoa(`${user}:${pass}`);
      const headerValue = `Basic ${credentials}`;

      document.getElementById('headerPreview').textContent = `Authorization: ${headerValue}`;
      return headerValue;
    }

    async function fetchTasks() {
      const responseEl = document.getElementById('tasksResponse');
      const authHeader = getAuthHeader();

      try {
        const response = await fetch(`${API_URL}/tasks`, {
          headers: { 'Authorization': authHeader }
        });

        const data = await response.json();

        responseEl.className = 'response ' + (response.ok ? 'success' : 'error');
        responseEl.textContent = JSON.stringify(data, null, 2);

        // If server returns 401, the browser may trigger its own popup
        // because of the WWW-Authenticate header.
      } catch (error) {
        responseEl.className = 'response error';
        responseEl.textContent = JSON.stringify({ error: "Server unreachable. Ensure dev:1 is running." }, null, 2);
      }
    }

    function clearLocalCredentials() {
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('tasksResponse').textContent = '';
      document.getElementById('tasksResponse').className = 'hidden';
      document.getElementById('headerPreview').textContent = 'Authorization: None';

      // Note: This does NOT clear the browser's internal Basic Auth cache.
      // You must close the tab or use Incognito to truly "log out".
    }
  </script>
</body>

</html>
