<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Auth Demo Client</title>
    <style>
      @layer base {
        :root {
          --bg: #fafaf9;
          --text: #44403c;
          --text-h: #1c1917;
          --border: #eaddd7;
          --code-bg: #f5f5f4;
          --accent: #f47121;
          --accent-bg: rgba(244, 113, 33, 0.05);
          --accent-border: rgba(244, 113, 33, 0.25);
          --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
          --sans: "Inter", system-ui, sans-serif;
          --mono: ui-monospace, "Cascadia Code", monospace;
          color-scheme: light dark;
          font-family: var(--sans);
          font-size: 18px;
          line-height: 1.6;
          color: var(--text);
          background-color: var(--bg);
        }

        @media (prefers-color-scheme: dark) {
          :root {
            --bg: #0c0a09;
            --text: #d6d3d1;
            --text-h: #f5f5f4;
            --border: #2e2a28;
            --code-bg: #1c1917;
            --accent: #f47121;
            --accent-bg: rgba(244, 113, 33, 0.05);
            --accent-border: rgba(244, 113, 33, 0.15);
          }
        }

        * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }

        body {
          padding: 2rem;
          max-width: 800px;
          margin: 0 auto;
        }

        h1 {
          font-size: 2.25rem;
          font-weight: 800;
          color: var(--text-h);
          margin-bottom: 0.5rem;
          letter-spacing: -0.025em;
        }

        p {
          margin-bottom: 1.5rem;
          color: var(--text);
        }

        input,
        button {
          font-family: inherit;
          font-size: 0.95rem;
          padding: 0.6rem 1rem;
          border-radius: 6px;
          border: 1px solid var(--border);
          background: transparent;
          color: var(--text-h);
          transition: all 0.2s;
        }

        input:focus {
          outline: none;
          border-color: var(--accent);
        }

        button {
          background: var(--text-h);
          color: var(--bg);
          border: none;
          font-weight: 600;
          cursor: pointer;
        }

        button:hover {
          opacity: 0.9;
        }

        button.secondary {
          background: transparent;
          border: 1px solid var(--border);
          color: var(--text);
        }

        button.secondary:hover {
          background: var(--code-bg);
        }

        pre {
          background: var(--code-bg);
          padding: 1rem;
          border-radius: 8px;
          border: 1px solid var(--border);
          overflow-x: auto;
          font-family: var(--mono);
          font-size: 0.85rem;
          margin-bottom: 1.5rem;
        }
      }

      @layer components {
        .auth-container {
          background: white;
          padding: 2rem;
          border-radius: 12px;
          border: 1px solid var(--border);
          box-shadow: var(--shadow);
          margin-bottom: 2rem;
        }

        @media (prefers-color-scheme: dark) {
          .auth-container {
            background: #141211;
          }
        }

        .form-group {
          display: flex;
          flex-direction: column;
          gap: 0.5rem;
          margin-bottom: 1rem;
        }

        .form-group label {
          font-size: 0.85rem;
          font-weight: 600;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          color: var(--text);
        }

        .btn-group {
          display: flex;
          gap: 0.75rem;
          margin-top: 1.5rem;
          margin-bottom: 1.5rem;
        }

        .preview-label {
          font-size: 0.8rem;
          font-weight: 700;
          text-transform: uppercase;
          color: var(--accent);
          margin-bottom: 0.5rem;
        }
      }
    </style>
  </head>

  <body>
    <h1>01. Basic Authentication</h1>
    <p>Credentials are Base64 encoded and sent with every request.</p>

    <div class="auth-container">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            id="username"
            value="admin"
            placeholder="Enter username"
          />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            value="secret123"
            placeholder="Enter password"
          />
        </div>
      </div>

      <div class="btn-group">
        <button id="btn-set">1. Set Credentials</button>
        <button id="btn-test">2. Test Authentication</button>
        <button id="btn-clear" class="secondary">Clear State</button>
      </div>

      <div class="preview-label">Header Preview</div>
      <pre id="header-preview">Authorization: None</pre>

      <div class="preview-label">Server Response</div>
      <pre id="response-output">
Click "Test Authentication" to make a request...</pre
      >
    </div>

    <script>
      const API_URL = "http://localhost:3001";
      let authHeaderValue = null;

      // DOM Elements
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const headerPreview = document.getElementById("header-preview");
      const responseOutput = document.getElementById("response-output");

      function updateHeaderPreview() {
        const username = usernameInput.value;
        const password = passwordInput.value;

        if (!username && !password) {
          authHeaderValue = "Basic Og=="; // Base64 of ":"
        } else {
          // btoa() creates a Base64-encoded ASCII string from a "string" of binary data
          const credentials = btoa(`${username}:${password}`);
          authHeaderValue = `Basic ${credentials}`;
        }
        headerPreview.textContent = `Authorization: ${authHeaderValue}`;
      }

      // Event Listeners
      document
        .getElementById("btn-set")
        .addEventListener("click", updateHeaderPreview);

      document.getElementById("btn-clear").addEventListener("click", () => {
        usernameInput.value = "";
        passwordInput.value = "";
        authHeaderValue = null;
        headerPreview.textContent = "Authorization: None";
        responseOutput.textContent = "State cleared.";
      });

      document
        .getElementById("btn-test")
        .addEventListener("click", async () => {
          // If user hasn't explicitly clicked "Set Credentials", calculate it now anyway
          if (!authHeaderValue) {
            updateHeaderPreview();
          }

          responseOutput.textContent = "Sending request...";

          try {
            const headers = {};
            if (authHeaderValue) {
              headers["Authorization"] = authHeaderValue;
            }

            const res = await fetch(`${API_URL}/tasks`, {
              method: "GET",
              headers: headers,
            });

            const data = await res.json();
            responseOutput.textContent = JSON.stringify(data, null, 2);
          } catch (err) {
            responseOutput.textContent = JSON.stringify(
              { error: "Server unreachable. Ensure dev:1 is running." },
              null,
              2,
            );
          }
        });

      // Initial preview setup
      updateHeaderPreview();
    </script>
  </body>
</html>
